# fail2ban jail for ChronoNode API
# Deploy: /etc/fail2ban/jail.d/chrononode-api.conf

[chrononode-api]
enabled = true
filter = chrononode-api
logpath = /var/log/caddy/chrononode-api.log
maxretry = 10
findtime = 60
bantime = 600
# Ban after 10 abusive requests in 60 seconds, for 10 minutes
# Abuse = 429 (rate-limited), 401 (unauthorized), 403 (forbidden)

# Use iptables to ban
action = iptables-multiport[name=chrononode-api, port="80,443", protocol=tcp]
