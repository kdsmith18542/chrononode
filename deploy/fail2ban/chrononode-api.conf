# ChronoNode API fail2ban filter
# Matches Caddy JSON log entries for ChronoNode API abuse
# Deploy: /etc/fail2ban/filter.d/chrononode-api.conf

[Definition]

# Match on Caddy JSON log lines where:
# - status code is 429 (rate limited) or 401/403 (auth failures)
# - the request is to the ChronoNode API
failregex = ^.*"status":429.*"/v1/.*$
            ^.*"status":401.*"/v1/.*$
            ^.*"status":403.*"/v1/.*$

# Extract the remote IP from the JSON log field "request"."remote_ip" or "request"."remote_addr"
# Caddy JSON format embeds IP in "request" → "remote_addr"
ignoreregex =
