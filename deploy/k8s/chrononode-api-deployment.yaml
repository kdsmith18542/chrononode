apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrononode-api
  labels:
    app: chrononode
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chrononode
      component: api
  template:
    metadata:
      labels:
        app: chrononode
        component: api
    spec:
      containers:
        - name: api
          image: chrononode:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --chain
            - baals
            - --port
            - "8080"
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chrononode-config
          env:
            - name: CHRONONODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chrononode-secrets
                  key: api_key
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chrononode-data
